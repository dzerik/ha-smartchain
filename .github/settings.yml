# These settings are synced to GitHub by https://probot.github.io/apps/settings/

repository:
  name: ha-smartchain
  description: "SmartChain — multi-provider LLM conversation agent for Home Assistant (GigaChat, YandexGPT, OpenAI) with tool calling and streaming"
  homepage: https://github.com/gritaro/ha-smartchain
  topics: homeassistant, hacs-integration, voice-assistant, langchain, gigachat, yandexgpt, openai, llm, smart-home, ai-agent
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  default_branch: main
  allow_squash_merge: true
  use_squash_pr_title_as_default: true
  allow_merge_commit: false
  allow_rebase_merge: true
  delete_branch_on_merge: true
  enable_vulnerability_alerts: true

labels:
- name: "Feature Request"
  color: "00ffbb"
- name: "Bug"
  color: "e30000"
- name: "Wont Fix"
  color: "ffffff"
- name: "Enhancement"
  color: "48ff00"
- name: "Documentation"
  color: "0077ff"
- name: "Help needed"
  color: "fbca04"
- name: "dependencies"
  color: "000000"
- name: "github_actions"
  color: "000000"
