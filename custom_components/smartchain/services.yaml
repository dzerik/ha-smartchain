ask:
  name: Ask SmartChain
  description: Send a message to SmartChain LLM and get a response.
  fields:
    message:
      name: Message
      description: The text message to send to the LLM
      required: true
      example: "What's the temperature in the kitchen?"
      selector:
        text:
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional)
      required: false
      selector:
        entity:
          domain: conversation

analyze_image:
  name: Analyze Camera Image
  description: >
    Send a camera snapshot to SmartChain LLM for visual analysis.
    Fires smartchain_image_analyzed event and updates sensor.smartchain_last_analysis.
  fields:
    message:
      name: Message
      description: The question or instruction for the LLM about the image
      required: true
      selector:
        text:
    camera_entity_id:
      name: Camera Entity
      description: The camera entity to capture a snapshot from
      required: true
      selector:
        entity:
          domain: camera
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional)
      required: false
      selector:
        entity:
          domain: conversation
    notify_entity:
      name: Notification Entity
      description: Send the LLM response as a notification (optional)
      required: false
      selector:
        entity:
          domain: notify

generate_automation:
  name: Generate YAML
  description: >
    Generate HA automation, script, scene, or blueprint YAML from natural language.
    The prompt is enriched with real HA entities, areas, and devices.
  fields:
    description:
      name: Description
      description: Natural language description of the desired automation/script/scene/blueprint
      required: true
      selector:
        text:
          multiline: true
    type:
      name: Type
      description: Type of YAML to generate
      required: false
      default: automation
      selector:
        select:
          options:
            - automation
            - script
            - scene
            - blueprint
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional)
      required: false
      selector:
        entity:
          domain: conversation
    entity_ids:
      name: Target Entities
      description: Specific HA entities to include in the LLM context
      required: false
      selector:
        entity:
          multiple: true
    source_yaml:
      name: Source YAML
      description: >
        Existing YAML to improve/edit. When provided, the LLM will modify
        the existing YAML based on the description instead of generating new.
      required: false
      selector:
        text:
          multiline: true
    deploy:
      name: Deploy
      description: Automatically deploy the generated YAML to Home Assistant
      required: false
      default: false
      selector:
        boolean:

deploy_automation:
  name: Deploy YAML
  description: >
    Deploy YAML directly to Home Assistant. Validates before writing.
    Supports automations.yaml, scripts.yaml, scenes.yaml, and blueprints/.
  fields:
    automation_yaml:
      name: YAML Content
      description: Valid Home Assistant YAML to deploy
      required: true
      selector:
        text:
          multiline: true
    type:
      name: Type
      description: Type of YAML being deployed
      required: false
      default: automation
      selector:
        select:
          options:
            - automation
            - script
            - scene
            - blueprint

validate_automation:
  name: Validate YAML
  description: >
    Validate YAML without deploying. Checks structure, entity existence, and service availability.
  fields:
    automation_yaml:
      name: YAML Content
      description: The YAML to validate
      required: true
      selector:
        text:
          multiline: true
    type:
      name: Type
      description: Type of YAML being validated
      required: false
      default: automation
      selector:
        select:
          options:
            - automation
            - script
            - scene
            - blueprint
