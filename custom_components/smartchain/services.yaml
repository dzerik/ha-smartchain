ask:
  name: Ask SmartChain
  description: Send a message to SmartChain LLM and get a response. Use in automations with Telegram, Slack, etc.
  fields:
    message:
      name: Message
      description: The text message to send to the LLM
      required: true
      example: "What's the temperature in the kitchen?"
      selector:
        text:
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional, uses first available if not specified)
      required: false
      example: "conversation.smartchain_gigachat"
      selector:
        entity:
          domain: conversation

analyze_image:
  name: Analyze Camera Image
  description: >
    Send a camera snapshot to SmartChain LLM for visual analysis.
    Also fires a smartchain_image_analyzed event and updates sensor.smartchain_last_analysis.
    Supports GigaChat 2.0, OpenAI GPT-4o, Anthropic Claude, Ollama (LLaVA/Gemma Vision).
  fields:
    message:
      name: Message
      description: The question or instruction for the LLM about the image
      required: true
      example: "What do you see on this camera? Is there anyone at the door?"
      selector:
        text:
    camera_entity_id:
      name: Camera Entity
      description: The camera entity to capture a snapshot from
      required: true
      example: "camera.front_door"
      selector:
        entity:
          domain: camera
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional, uses first available if not specified)
      required: false
      example: "conversation.smartchain_gigachat"
      selector:
        entity:
          domain: conversation
    notify_entity:
      name: Notification Entity
      description: Send the LLM response as a notification (optional)
      required: false
      example: "notify.mobile_app_phone"
      selector:
        entity:
          domain: notify

generate_automation:
  name: Generate Automation
  description: >
    Describe an automation in natural language and SmartChain will generate
    valid Home Assistant automation YAML using an LLM. The prompt is enriched
    with real HA entities, areas, and devices for accurate entity_id references.
    Optionally deploy it directly to Home Assistant.
  fields:
    description:
      name: Description
      description: Natural language description of the desired automation
      required: true
      example: "Turn on the coffee machine at 7:00 AM on weekdays if I'm home"
      selector:
        text:
          multiline: true
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional, uses first available if not specified)
      required: false
      example: "conversation.smartchain_gigachat"
      selector:
        entity:
          domain: conversation
    entity_ids:
      name: Target Entities
      description: >
        Specific HA entities to include in the LLM context. If not provided,
        all available entities are included (up to a limit). Use this to focus
        the LLM on specific devices.
      required: false
      example: '["light.kitchen", "switch.coffee_machine", "person.john"]'
      selector:
        entity:
          multiple: true
    deploy:
      name: Deploy
      description: Automatically deploy the generated automation to Home Assistant
      required: false
      default: false
      example: true
      selector:
        boolean:

deploy_automation:
  name: Deploy Automation
  description: >
    Deploy raw automation YAML directly to Home Assistant.
    Validates the YAML before writing to automations.yaml and triggers reload.
  fields:
    automation_yaml:
      name: Automation YAML
      description: Valid Home Assistant automation YAML to deploy
      required: true
      example: "alias: Test\ntrigger:\n  - platform: time\n    at: '07:00:00'\naction:\n  - service: light.turn_on\n    target:\n      entity_id: light.kitchen"
      selector:
        text:
          multiline: true

validate_automation:
  name: Validate Automation
  description: >
    Validate automation YAML without deploying. Checks structure (required keys),
    entity_id existence, and service availability.
  fields:
    automation_yaml:
      name: Automation YAML
      description: The automation YAML to validate
      required: true
      selector:
        text:
          multiline: true
