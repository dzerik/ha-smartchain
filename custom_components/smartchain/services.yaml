ask:
  name: Ask SmartChain
  description: Send a message to SmartChain LLM and get a response. Use in automations with Telegram, Slack, etc.
  fields:
    message:
      name: Message
      description: The text message to send to the LLM
      required: true
      example: "What's the temperature in the kitchen?"
      selector:
        text:
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional, uses first available if not specified)
      required: false
      example: "conversation.smartchain_gigachat"
      selector:
        entity:
          domain: conversation

analyze_image:
  name: Analyze Camera Image
  description: >
    Send a camera snapshot to SmartChain LLM for visual analysis.
    Also fires a smartchain_image_analyzed event and updates sensor.smartchain_last_analysis.
    Supports GigaChat 2.0, OpenAI GPT-4o, Anthropic Claude, Ollama (LLaVA/Gemma Vision).
  fields:
    message:
      name: Message
      description: The question or instruction for the LLM about the image
      required: true
      example: "What do you see on this camera? Is there anyone at the door?"
      selector:
        text:
    camera_entity_id:
      name: Camera Entity
      description: The camera entity to capture a snapshot from
      required: true
      example: "camera.front_door"
      selector:
        entity:
          domain: camera
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional, uses first available if not specified)
      required: false
      example: "conversation.smartchain_gigachat"
      selector:
        entity:
          domain: conversation
    notify_entity:
      name: Notification Entity
      description: Send the LLM response as a notification (optional)
      required: false
      example: "notify.mobile_app_phone"
      selector:
        entity:
          domain: notify

generate_automation:
  name: Generate Automation
  description: >
    Describe an automation in natural language and SmartChain will generate
    valid Home Assistant automation YAML using an LLM. The generated YAML
    is returned in the response and can be copied to automations.yaml.
  fields:
    description:
      name: Description
      description: Natural language description of the desired automation
      required: true
      example: "Turn on the coffee machine at 7:00 AM on weekdays if I'm home"
      selector:
        text:
          multiline: true
    entity_id:
      name: Agent Entity
      description: The conversation agent entity to use (optional, uses first available if not specified)
      required: false
      example: "conversation.smartchain_gigachat"
      selector:
        entity:
          domain: conversation
